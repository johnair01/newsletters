name: Deploy web/ to GitHub Pages

# Builds the Next.js app in web/ as a static export and publishes it to
# GitHub Pages (https://<owner>.github.io/newsletters/). Runs on the default
# branch, on this feature branch (so the work can be previewed before merge),
# and on manual dispatch.
on:
  push:
    branches: [main, claude/swimlane-report-composer-1i8vxt]
    paths: ['web/**', 'content/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - run: npm run build
      # The rendered report corpora (the actual reviewable product — claim-beside-trace
      # pages with honesty panels) publish alongside the web app so a reviewer can READ
      # a report at /reports/<corpus>/ instead of opening raw HTML from the repo.
      - name: Bundle rendered report corpora
        working-directory: .
        run: |
          mkdir -p web/out/reports
          for corpus in rev1 work module; do
            if [ -d "content/${corpus}/site" ]; then
              cp -r "content/${corpus}/site" "web/out/reports/${corpus}"
            fi
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
