<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Newsletters — Working in the Open</title>
<link rel="stylesheet" href="signals/tokens.css" />
<style>
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--color-paper, #f5f3ee); }
  #root { min-height: 100vh; }
  /* responsive: collapse two-up grids on narrow viewports */
  @media (max-width: 980px) {
    .signals .nl-2col,
    .signals .nl-demo-grid { grid-template-columns: 1fr !important; }
    .signals .nl-demo-grid > div:first-child { position: static !important; }
    .signals .nl-how-grid { grid-template-columns: 1fr !important; }
    .signals .nl-practice-grid { grid-template-columns: 1fr 1fr !important; }
    .signals .nl-pipe { grid-template-columns: 1fr 1fr !important; }
    .signals .nl-surface-row { grid-template-columns: 56px 1fr !important; }
    .signals .nl-surface-row > div:last-child { grid-column: 1 / -1; text-align: left !important; }
  }
  @media (max-width: 720px) {
    .signals .site-nav nav { display: none !important; }
    .signals .nl-foot-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
    .signals .nl-practice-grid { grid-template-columns: 1fr !important; }
    .signals .nl-pipe { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#0a0a0f"/>
    <rect x="22" y="28" width="40" height="8" fill="#0068b5"/>
    <rect x="22" y="44" width="56" height="5" fill="#c8c4bb"/>
    <rect x="22" y="54" width="44" height="5" fill="#c8c4bb"/>
    <rect x="22" y="66" width="30" height="6" fill="#d4622a"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="signals/atoms.jsx"></script>
<script type="text/babel" src="newsletters/home-atoms.jsx"></script>
<script type="text/babel" src="newsletters/home.jsx"></script>

<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById('root')).render(<Home />);
</script>
</body>
</html>
